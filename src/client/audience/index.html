<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a472a">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/audience.css">
  <title>Stadium Lights — HIPICO</title>
</head>
<body>
  <div id="welcomeScreen" class="screen active">
    <h1>🏇 Light Show</h1>
    <p>Sincroniza tu teléfono con el show del evento</p>
    <p style="font-size:0.8rem;color:#555;margin-bottom:24px;">
      Sube el brillo al máximo y no bloquees la pantalla
    </p>
    <button class="btn btn-primary" id="startBtn">Participar</button>
  </div>

  <div id="sectionScreen" class="screen">
    <h1>Elige tu grada</h1>
    <p>¿En qué sección estás?</p>
    <div class="section-list" id="sectionList"></div>
    <button class="back-btn" data-back="welcome">← Volver</button>
  </div>

  <div id="tableScreen" class="screen">
    <h1 id="tableScreenTitle">Elige tu mesa</h1>
    <p>Toca la mesa donde estás sentado</p>
    <div class="table-map" id="tableMap"></div>
    <button class="back-btn" data-back="section">← Cambiar grada</button>
  </div>

  <div id="seatScreen" class="screen">
    <h1 id="seatScreenTitle">Elige tu asiento</h1>
    <p>Selecciona tu lugar en la mesa</p>
    <div class="seat-picker" id="seatPicker"></div>
    <button class="btn btn-secondary" id="autoSeatBtn">Asignarme asiento libre</button>
    <p class="error-msg" id="joinError" style="display:none;"></p>
    <button class="back-btn" data-back="table">← Cambiar mesa</button>
  </div>

  <div id="waitingScreen" class="screen">
    <div class="pulse"></div>
    <div class="position-badge" id="positionBadge">---</div>
    <div class="status-text" id="statusText">Esperando señal...</div>
  </div>

  <div id="showScreen"></div>
  <div id="infoOverlay">Conectando...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/audience.js"></script>
</body>
</html>
