<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/operator.css">
  <title>Operador - Hipico Light Show</title>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Hipico Light Show</p>
      <h1>Operador</h1>
    </div>
    <div class="connection">
      <span id="connectionState">Conectando</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel event-panel">
      <h2>Evento</h2>
      <div class="event-row">
        <input id="eventIdInput" type="text" value="hipico-demo" aria-label="Evento">
        <button id="connectBtn" class="btn">Conectar</button>
      </div>
      <canvas id="qrCanvas" width="180" height="180"></canvas>
      <p id="qrUrl" class="qr-url">---</p>
    </section>

    <section class="panel stats-panel">
      <h2>Estado</h2>
      <div class="stats-grid">
        <div><strong id="readyCount">0</strong><span>Listos</span></div>
        <div><strong id="torchCount">0</strong><span>Con flash</span></div>
        <div><strong id="screenOnlyCount">0</strong><span>Solo pantalla</span></div>
        <div><strong id="hapticsCount">0</strong><span>Haptics</span></div>
      </div>
    </section>

    <section class="panel controls-panel">
      <div class="controls-head">
        <h2>Shows</h2>
        <label class="toggle">
          <input id="dryRunToggle" type="checkbox">
          Dry-run
        </label>
      </div>
      <div class="show-block">
        <div id="showGrid" class="show-grid"></div>
      </div>
      <details class="custom-show">
        <summary>Show custom</summary>
        <textarea id="customShowInput" spellcheck="false">{
  "label": "Custom 20s",
  "summary": "Verde, sparkle y cierre blanco",
  "cues": [
    { "at": 0, "scene": { "action": "solid", "color": "#1f8f4d" } },
    { "at": 5000, "scene": { "action": "sparkle", "color": "#ffffff", "duration": 6000, "useTorch": true } },
    { "at": 12000, "scene": { "action": "solid", "color": "#ffffff" } },
    { "at": 18000, "scene": { "action": "off" } }
  ]
}</textarea>
        <button id="runCustomShowBtn" class="btn custom-run" type="button">Ejecutar custom</button>
      </details>
      <div class="manual-block">
        <h3>Escenas manuales</h3>
        <label class="color-field">
          <span>Color</span>
          <input type="color" id="colorPicker" value="#1f8f4d">
        </label>
        <div id="sceneGrid" class="scene-grid"></div>
      </div>
    </section>

    <section class="panel log-panel">
      <h2>Log</h2>
      <div id="log" class="log"></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/operator.js"></script>
</body>
</html>
