<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <title>🏟️ Light Show</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: white;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== Pantalla: Selección de zona ===== */
    #zoneScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 20px;
      text-align: center;
    }
    #zoneScreen h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    #zoneScreen p {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    #zoneScreen .subtitle {
      color: #666;
      font-size: 0.8rem;
      margin-bottom: 15px;
    }
    .grid-container {
      display: grid;
      gap: 6px;
      margin-bottom: 25px;
      max-width: 360px;
      width: 100%;
    }
    .grid-cell {
      aspect-ratio: 1;
      border-radius: 10px;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .grid-cell:active {
      transform: scale(0.92);
    }
    .grid-cell.selected {
      background: #007AFF;
      border-color: #007AFF;
      color: white;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(0,122,255,0.5);
    }
    .grid-cell.occupied {
      background: #2a2a3a;
      border-color: #3a3a5a;
    }
    .btn-auto {
      padding: 14px 36px;
      font-size: 1rem;
      background: #333;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-auto:active { background: #444; }

    /* ===== Pantalla: Esperando ===== */
    #waitingScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      text-align: center;
      padding: 20px;
    }
    #waitingScreen .position-badge {
      background: #007AFF;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 1.1rem;
      margin-bottom: 20px;
    }
    #waitingScreen .status-text {
      color: #666;
      font-size: 0.9rem;
    }
    #waitingScreen .pulse {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 3px solid #333;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    /* ===== Pantalla: Show (color de pantalla) ===== */
    #showScreen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 99999;
      transition: background-color 0.1s;
    }

    /* ===== Info overlay ===== */
    #infoOverlay {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.7rem;
      color: #888;
      z-index: 100000;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Pantalla de selección de zona -->
  <div id="zoneScreen">
    <h1>🏟️ Light Show</h1>
    <p>Toca tu posición en el mapa</p>
    <div class="subtitle">Selecciona dónde estás sentado</div>
    <div class="grid-container" id="grid"></div>
    <button class="btn-auto" onclick="autoJoin()">Asignarme automáticamente</button>
  </div>

  <!-- Pantalla de espera -->
  <div id="waitingScreen">
    <div class="pulse" id="waitingPulse"></div>
    <div class="position-badge" id="positionBadge">---</div>
    <div class="status-text" id="statusText">Esperando señal...</div>
  </div>

  <!-- Pantalla del show (color de fondo) -->
  <div id="showScreen"></div>

  <!-- Info -->
  <div id="infoOverlay" id="info">-</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== Configuración =====
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('event') || 'demo';
    const GRID_ROWS = parseInt(params.get('rows')) || 6;
    const GRID_COLS = parseInt(params.get('cols')) || 8;

    let socket;
    let myRow = -1;
    let myCol = -1;
    let clockOffset = 0;
    let selectedCell = null;

    // ===== Inicializar =====
    function init() {
      buildGrid();
      connectSocket();
    }

    // ===== Construir grid =====
    function buildGrid() {
      const grid = document.getElementById('grid');
      grid.style.gridTemplateColumns = `repeat(${GRID_COLS}, 1fr)`;

      for (let r = 0; r < GRID_ROWS; r++) {
        for (let c = 0; c < GRID_COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.textContent = `${r+1},${c+1}`;
          cell.onclick = () => selectCell(r, c, cell);
          grid.appendChild(cell);
        }
      }
    }

    // ===== Seleccionar celda =====
    function selectCell(row, col, cell) {
      // Deseleccionar anterior
      if (selectedCell) selectedCell.classList.remove('selected');

      selectedCell = cell;
      cell.classList.add('selected');

      // Unirse después de un breve delay
      setTimeout(() => joinWithPosition(row, col), 400);
    }

    // ===== Auto-join =====
    function autoJoin() {
      joinWithPosition(null, null, true);
    }

    // ===== Conectar socket =====
    function connectSocket() {
      socket = io({
        reconnection: true,
        reconnectionDelay: 1000
      });

      socket.on('connect', () => {
        document.getElementById('infoOverlay').textContent = '🟢 Conectado';
        syncClock();
      });

      socket.on('disconnect', () => {
        document.getElementById('infoOverlay').textContent = '🔴 Desconectado';
      });

      socket.on('joined', (data) => {
        myRow = data.row;
        myCol = data.col;

        // Mostrar pantalla de espera
        document.getElementById('zoneScreen').style.display = 'none';
        document.getElementById('waitingScreen').style.display = 'flex';
        document.getElementById('positionBadge').textContent = `Fila ${myRow + 1}, Columna ${myCol + 1}`;
        document.getElementById('statusText').textContent =
          `${data.participantCount} participantes conectados`;

        // Wake Lock
        requestWakeLock();
      });

      socket.on('pattern', (data) => {
        executePattern(data);
      });

      socket.on('pixel', (data) => {
        showColor(data.color);
      });
    }

    // ===== Unirse con posición =====
    function joinWithPosition(row, col, auto = false) {
      socket.emit('join_event', {
        eventId,
        row,
        col,
        autoAssign: auto
      });
    }

    // ===== Sincronizar reloj =====
    async function syncClock() {
      const offsets = [];
      for (let i = 0; i < 8; i++) {
        const t1 = performance.now();
        const result = await new Promise(resolve => {
          socket.emit('time_ping', {}, resolve);
        });
        const t4 = performance.now();
        const rtt = t4 - t1;
        offsets.push({
          offset: result.serverTime - Date.now() - (rtt / 2),
          rtt
        });
        await new Promise(r => setTimeout(r, 100));
      }
      offsets.sort((a, b) => a.rtt - b.rtt);
      const best = offsets.slice(0, 4);
      clockOffset = best.reduce((s, o) => s + o.offset, 0) / best.length;
    }

    // ===== Wake Lock =====
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch(e) {}
    }

    // ===== Ejecutar patrones =====
    async function executePattern(pattern) {
      // Esperar al momento sincronizado
      const delay = (pattern.executeAt + clockOffset) - Date.now();
      if (delay > 0) {
        await new Promise(r => setTimeout(r, delay));
      }

      switch (pattern.action) {
        case 'color':
          showColor(pattern.color || '#FFFFFF');
          break;
        case 'off':
          hideColor();
          break;
        case 'strobe':
          doStrobe(pattern.interval || 150, pattern.duration || 3000, pattern.color);
          break;
        case 'flash':
          showColor(pattern.color || '#FFFFFF');
          setTimeout(() => hideColor(), pattern.duration || 500);
          break;
        case 'wave':
          doWave(pattern);
          break;
        case 'sequence':
          doSequence(pattern);
          break;
        case 'rainbow':
          doRainbow(pattern);
          break;
      }
    }

    // ===== Mostrar color =====
    function showColor(color) {
      const show = document.getElementById('showScreen');
      show.style.display = 'block';
      show.style.backgroundColor = color;
      // Actualizar theme-color para que la barra del navegador también cambie
      document.querySelector('meta[name="theme-color"]').content = color;
    }

    function hideColor() {
      document.getElementById('showScreen').style.display = 'none';
      document.querySelector('meta[name="theme-color"]').content = '#000000';
    }

    // ===== Estroboscopio =====
    async function doStrobe(intervalMs, durationMs, color) {
      const start = Date.now();
      let on = false;
      while (Date.now() - start < durationMs) {
        on = !on;
        on ? showColor(color || '#FFFFFF') : hideColor();
        await new Promise(r => setTimeout(r, intervalMs));
      }
      hideColor();
    }

    // ===== Ola =====
    async function doWave(pattern) {
      const { direction, speed, color } = pattern;
      const delay = speed || 200;
      let steps;

      if (direction === 'left-right') {
        steps = myCol;
      } else if (direction === 'right-left') {
        steps = (GRID_COLS - 1) - myCol;
      } else if (direction === 'top-bottom') {
        steps = myRow;
      } else {
        steps = (GRID_ROWS - 1) - myRow;
      }

      await new Promise(r => setTimeout(r, steps * delay));
      showColor(color || '#007AFF');
      await new Promise(r => setTimeout(r, delay * 3));
      hideColor();
    }

    // ===== Secuencia =====
    async function doSequence(pattern) {
      const { frames, intervalMs } = pattern;
      for (const frame of frames) {
        // frame puede ser {all: '#FF0000'} o {cells: [[row,col,'#FF0000'], ...]}
        if (frame.all) {
          showColor(frame.all);
        } else if (frame.cells) {
          const myCell = frame.cells.find(c => c[0] === myRow && c[1] === myCol);
          if (myCell) {
            showColor(myCell[2]);
          } else {
            hideColor();
          }
        }
        await new Promise(r => setTimeout(r, intervalMs || 500));
      }
      hideColor();
    }

    // ===== Arcoíris =====
    async function doRainbow(pattern) {
      const { duration } = pattern;
      const hue = ((myCol / GRID_COLS) * 360 + (myRow / GRID_ROWS) * 30) % 360;
      showColor(`hsl(${hue}, 100%, 50%)`);
      await new Promise(r => setTimeout(r, duration || 5000));
      hideColor();
    }

    // ===== Iniciar =====
    init();
  </script>
</body>
</html>
