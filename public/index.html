<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050505">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/audience.css">
  <title>Hipico Light Show</title>
</head>
<body>
  <main class="app-shell">
    <section id="joinPanel" class="panel">
      <p class="eyebrow">Hipico Light Show</p>
      <h1>Tu telefono es parte del show</h1>
      <p class="copy">Sube el brillo, toca participar y manten la pantalla hacia la pista.</p>
      <button class="primary-btn" id="startBtn">Entrar al show</button>
      <p class="status-line" id="statusText">Esperando...</p>
    </section>

    <section id="readyPanel" class="panel ready-panel" hidden>
      <div class="ready-dot"></div>
      <h1 id="readyTitle">Listo</h1>
      <p id="readyDetail" class="copy">Espera la senal del operador.</p>
      <div class="counter">
        <span id="readyCount">0</span>
        <small>telefonos listos</small>
      </div>
    </section>
  </main>

  <div id="showScreen" hidden></div>
  <div id="infoOverlay">Conectando...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/audience.js"></script>
</body>
</html>
